name: CI – Rotalog Suite
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      # ---------- Java services ----------
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Build rotalog-api-frotas
        working-directory: ./rotalog-api-frotas
        run: mvn clean install

      # ---------- .NET service ----------
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'   # adjust as needed

      - name: Build rotalog-api-notificacoes
        working-directory: ./rotalog-api-notificacoes
        run: |
          dotnet restore
          dotnet build --configuration Release
          # dotnet test   # uncomment if you have tests

      # ---------- Node/Express service ----------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify lockfile is in sync (package.json ↔ package-lock.json)
        working-directory: ./rotalog-api-entregas
        run: |
          # Protege contra a regressão que quebrou o `npm CI`:
          # dessincronia entre package.json e package-lock.json (ex. entradas
          # órfãs como cors/pg-hstore). `npm ci --dry-run` aborta se estiverem
          # fora de sync.
          npm ci --dry-run

      - name: Validate OpenAPI spec
        working-directory: ./rotalog-api-entregas
        run: |
          # Garante que a documentação de interfaces existe e é um YAML válido.
          node -e "const yaml=require('js-yaml'),fs=require('fs');const s=yaml.load(fs.readFileSync('docs/openapi.yaml','utf8'));if(!s||s.openapi!=='3.0.3'){console.error('openapi.yaml inválido ou versão inesperada');process.exit(1);}console.log('openapi.yaml OK —',Object.keys(s.paths).length,'paths,',Object.keys(s.components.schemas).length,'schemas');"

      - name: Install & test rotalog-api-entregas
        working-directory: ./rotalog-api-entregas
        run: |
          npm ci
          npm test

      # ---------- Workspace utilities (optional) ----------
      - name: Install & lint workspace (if present)
        working-directory: ./rotalog-workspace
        run: |
          npm ci
          npm run lint
        continue-on-error: true

      # ---------- Front‑end (Nx) ----------
      - name: Install Nx workspace dependencies
        working-directory: ./rotalog-frontend
        run: npm ci

      - name: Build all frontend apps
        working-directory: ./rotalog-frontend
        run: npx nx run-many --target=build --all

      - name: Run Jest + Playwright tests
        working-directory: ./rotalog-frontend
        run: npx nx affected --target=test
